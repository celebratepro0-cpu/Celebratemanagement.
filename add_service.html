{% extends "admin/base.html" %}

{% block title %}Add Service - Admin{% endblock %}

{% block content %}
<div class="admin-header">
    <h1>Add New Service</h1>
    <a href="{{ url_for('admin_services') }}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Back to Services
    </a>
</div>

<div class="admin-card">
    <div class="admin-card-body">
        <form action="{{ url_for('add_service') }}" method="POST" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Service Name *</label>
                    <input type="text" id="name" name="name" placeholder="e.g., VIP Meet & Greet" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe the service in detail..." required></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price ($) *</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required>
                </div>
                
                <div class="form-group">
                    <label for="duration">Duration *</label>
                    <input type="text" id="duration" name="duration" placeholder="e.g., 30 minutes, 1 hour" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="image">Service Image</label>
                <input type="file" id="image" name="image" accept="image/*" style="padding: 0.75rem;">
                <small style="color: #999; display: block; margin-top: 0.5rem;">Accepted formats: JPG, PNG, GIF, WebP. Max size: 16MB</small>
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-plus"></i> Create Service
                </button>
                <a href="{{ url_for('admin_services') }}" class="btn btn-outline btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
